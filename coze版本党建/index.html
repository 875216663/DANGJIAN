<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>中英智慧党建管理平台</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at top left, rgba(191, 29, 37, 0.16), transparent 24%),
          linear-gradient(180deg, #fffaf5 0%, #f7f1ea 100%);
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .loading {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        color: #5f4639;
        letter-spacing: 0.04em;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: transparent;
      }
    </style>
  </head>
  <body>
    <div class="loading" id="loading">正在加载党建系统...</div>
    <iframe
      id="app-frame"
      src="/source/projects/release/index.html"
      title="中英智慧党建管理平台"
      onload="document.getElementById('loading').style.display='none'"
    ></iframe>
  </body>
</html>
