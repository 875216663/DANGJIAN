<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>中英智慧党建管理平台</title>
    <style>
      :root {
        --bg: #f7f1ea;
        --panel: rgba(255, 255, 255, 0.92);
        --line: rgba(120, 74, 52, 0.14);
        --text: #2f221d;
        --muted: #7b655b;
        --primary: #bf1d25;
        --primary-deep: #8f1318;
        --accent: #d97706;
        --success: #0f766e;
        --danger: #be123c;
        --shadow: 0 20px 46px rgba(92, 58, 40, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(191, 29, 37, 0.15), transparent 25%),
          radial-gradient(circle at top right, rgba(217, 119, 6, 0.1), transparent 20%),
          linear-gradient(180deg, #fffaf5 0%, var(--bg) 100%);
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .hidden {
        display: none !important;
      }

      .shell {
        display: grid;
        grid-template-columns: 280px 1fr;
        min-height: 100vh;
      }

      .sidebar {
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 18px;
        padding: 20px;
        border-right: 1px solid var(--line);
        background: rgba(255, 249, 244, 0.8);
        backdrop-filter: blur(18px);
      }

      .brand,
      .login-card,
      .card,
      .panel,
      .modal-card,
      .toast {
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .brand {
        padding: 18px;
        background: linear-gradient(145deg, rgba(191, 29, 37, 0.1), rgba(217, 119, 6, 0.06));
      }

      .brand-mark {
        width: 52px;
        height: 52px;
        display: grid;
        place-items: center;
        border-radius: 16px;
        color: #fff;
        font-size: 28px;
        font-weight: 700;
        background: linear-gradient(135deg, var(--primary), var(--primary-deep));
      }

      .brand h1,
      .brand h2,
      .section-title,
      .login-card h2,
      .modal-card h3 {
        margin: 0;
      }

      .brand p,
      .muted,
      .helper,
      .section-subtitle {
        margin: 0;
        color: var(--muted);
      }

      .nav {
        display: grid;
        gap: 10px;
        align-content: start;
      }

      .nav button,
      .btn,
      .tag {
        border-radius: 16px;
        border: 1px solid var(--line);
      }

      .nav button,
      .btn.secondary {
        background: rgba(255, 255, 255, 0.84);
      }

      .nav button {
        padding: 12px 14px;
        text-align: left;
      }

      .nav button.active,
      .btn.primary {
        color: #fff;
        border-color: rgba(191, 29, 37, 0.42);
        background: linear-gradient(135deg, var(--primary), var(--primary-deep));
      }

      .btn {
        min-height: 44px;
        padding: 10px 16px;
      }

      .btn.danger {
        color: #fff;
        border-color: rgba(190, 18, 60, 0.32);
        background: linear-gradient(135deg, var(--danger), #9f1239);
      }

      .sidebar-actions {
        display: grid;
        gap: 10px;
      }

      .main {
        padding: 24px;
      }

      .topbar,
      .toolbar,
      .stack,
      .form-grid,
      .metrics,
      .two-col,
      .actions {
        display: grid;
        gap: 14px;
      }

      .topbar {
        grid-template-columns: 1fr auto;
        align-items: end;
      }

      .topbar-tags,
      .inline-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.84);
      }

      .tag.primary {
        color: var(--primary);
        background: rgba(191, 29, 37, 0.1);
      }

      .tag.success {
        color: var(--success);
        background: rgba(15, 118, 110, 0.12);
      }

      .tag.warning {
        color: var(--accent);
        background: rgba(217, 119, 6, 0.14);
      }

      .tag.danger {
        color: var(--danger);
        background: rgba(190, 18, 60, 0.12);
      }

      .metrics {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        margin-top: 18px;
      }

      .card,
      .panel {
        padding: 18px;
      }

      .metric-number {
        display: block;
        font-size: 30px;
        font-weight: 700;
        margin: 10px 0 6px;
      }

      .two-col {
        grid-template-columns: 1.1fr 0.9fr;
        margin-top: 18px;
      }

      .toolbar {
        grid-template-columns: 1fr auto;
        align-items: center;
      }

      .toolbar .filters,
      .toolbar .ops {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .toolbar input,
      .toolbar select,
      .field input,
      .field select,
      .field textarea {
        min-height: 44px;
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.92);
      }

      .field textarea {
        min-height: 110px;
        resize: vertical;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 12px 8px;
        text-align: left;
        border-bottom: 1px solid rgba(120, 74, 52, 0.1);
        vertical-align: top;
      }

      th {
        font-size: 13px;
        color: var(--muted);
      }

      tbody tr:last-child td {
        border-bottom: none;
      }

      .empty {
        padding: 32px 18px;
        text-align: center;
        border-radius: 18px;
        border: 1px dashed rgba(120, 74, 52, 0.22);
        background: rgba(255, 255, 255, 0.7);
      }

      .login {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .login-card {
        width: min(980px, 100%);
        padding: 24px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }

      .hero {
        padding: 24px;
        border-radius: 22px;
        color: #fff;
        background: linear-gradient(135deg, #9f1239 0%, var(--primary) 50%, #c2410c 100%);
      }

      .hero ul {
        padding-left: 18px;
      }

      .demo-list {
        display: grid;
        gap: 10px;
      }

      .demo-item {
        padding: 12px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.8);
      }

      .form-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      .modal {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: grid;
        place-items: center;
        padding: 20px;
        background: rgba(47, 34, 29, 0.5);
      }

      .modal-card {
        width: min(920px, 100%);
        max-height: 90vh;
        overflow: auto;
        padding: 22px;
      }

      .actions {
        grid-auto-flow: column;
        justify-content: end;
      }

      .toast {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 40;
        min-width: 240px;
        padding: 14px 16px;
        color: #fff;
        background: rgba(47, 34, 29, 0.94);
      }

      .toast.success {
        background: rgba(15, 118, 110, 0.94);
      }

      .toast.warning {
        background: rgba(217, 119, 6, 0.94);
      }

      .toast.danger {
        background: rgba(190, 18, 60, 0.94);
      }

      @media (max-width: 1080px) {
        .metrics,
        .two-col,
        .login-card {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 900px) {
        .shell {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: none;
          border-bottom: 1px solid var(--line);
        }

        .form-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 720px) {
        .main,
        .sidebar,
        .login-card,
        .hero {
          padding: 16px;
        }

        .topbar,
        .toolbar {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <section id="login-screen" class="login">
      <div class="login-card">
        <div class="hero">
          <div class="brand-mark">党</div>
          <h2 style="margin:16px 0 8px;">中英智慧党建管理平台</h2>
          <p>这是一个可直接上线的静态发布版本，聚焦党建管理最核心的组织、党员、审批与账号权限流程。</p>
          <ul>
            <li>党委领导看全局数据与最终审批</li>
            <li>党建纪检部维护党员、支部、账号与审核流转</li>
            <li>支部书记管理本支部并提交敏感变更</li>
            <li>普通党员维护个人信息并查看审批结果</li>
          </ul>
        </div>

        <div class="stack">
          <div>
            <h2>账号登录</h2>
            <p class="helper">默认演示密码均为 `123456`。</p>
          </div>
          <form id="login-form" class="stack">
            <div class="field">
              <label>账号</label>
              <input id="login-username" required />
            </div>
            <div class="field">
              <label>密码</label>
              <input id="login-password" type="password" required />
            </div>
            <button class="btn primary" type="submit">登录系统</button>
          </form>

          <div class="demo-list" id="demo-list"></div>
        </div>
      </div>
    </section>

    <section id="app-screen" class="shell hidden">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">党</div>
          <h1 style="font-size:22px; margin-top:14px;">党建工作台</h1>
          <p id="sidebar-role" style="margin-top:8px;">按角色展示权限范围</p>
        </div>

        <nav id="nav" class="nav"></nav>

        <div class="sidebar-actions">
          <button class="btn secondary" id="export-btn">导出本地数据</button>
          <button class="btn secondary" id="import-btn">导入本地数据</button>
          <button class="btn secondary" id="reset-btn">恢复演示数据</button>
          <button class="btn danger" id="logout-btn">退出登录</button>
        </div>
      </aside>

      <main class="main">
        <div class="topbar">
          <div>
            <h2 id="page-title" style="margin:0 0 6px;">首页工作台</h2>
            <p id="page-desc" class="section-subtitle">党建管理发布版</p>
          </div>
          <div class="topbar-tags">
            <span class="tag"><strong id="current-user">未登录</strong></span>
            <span class="tag primary" id="current-role">角色</span>
            <span class="tag" id="today"></span>
          </div>
        </div>
        <div id="page-root"></div>
      </main>
    </section>

    <div id="modal" class="modal hidden">
      <div class="modal-card">
        <div style="display:flex; justify-content:space-between; gap:12px; align-items:flex-start; margin-bottom:16px;">
          <div>
            <h3 id="modal-title">编辑</h3>
            <p id="modal-desc" class="helper">保存后会写入浏览器本地存储。</p>
          </div>
          <button class="btn secondary" id="modal-close" type="button">关闭</button>
        </div>
        <form id="modal-form">
          <div id="modal-fields" class="form-grid"></div>
          <div class="actions" style="margin-top:16px;">
            <button class="btn secondary" id="modal-cancel" type="button">取消</button>
            <button class="btn primary" type="submit">保存</button>
          </div>
        </form>
      </div>
    </div>

    <input id="import-file" type="file" accept="application/json,.json" class="hidden" />
    <div id="toast" class="toast hidden"></div>

    <script>
      const DATA_KEY = "dangjian-release-data-v1";
      const SESSION_KEY = "dangjian-release-session-v1";
      const ROLE_LABELS = { leader: "党委领导", dept: "党建纪检部", branch_admin: "党支部书记", member: "普通党员" };
      const PAGE_META = {
        dashboard: ["首页工作台", "查看组织概况、审批进度和角色待办"],
        members: ["党员管理", "维护党员档案和支部归属"],
        branches: ["支部管理", "查看支部结构与书记信息"],
        approvals: ["审批中心", "处理敏感信息变更流程"],
        accounts: ["账号权限", "绑定账号、角色和启停状态"],
        profile: ["个人中心", "维护个人资料与密码"],
      };
      const NAV_BY_ROLE = {
        leader: ["dashboard", "members", "branches", "approvals", "profile"],
        dept: ["dashboard", "members", "branches", "accounts", "approvals", "profile"],
        branch_admin: ["dashboard", "members", "approvals", "profile"],
        member: ["dashboard", "profile"],
      };
      const DEFAULT_PAGE = { leader: "dashboard", dept: "dashboard", branch_admin: "members", member: "profile" };
      const SENSITIVE_FIELDS = new Set(["name", "branchId", "politicalStatus", "joinDate", "regularDate", "status"]);
      const seed = {
        branches: [
          { id: "b1", name: "第一党支部", code: "DZ-001", secretary: "王立新", phone: "021-60000001", description: "覆盖运营与客服条线。", status: "active" },
          { id: "b2", name: "第二党支部", code: "DZ-002", secretary: "李海燕", phone: "021-60000002", description: "覆盖人力与综合管理条线。", status: "active" },
          { id: "b3", name: "机关党支部", code: "DZ-003", secretary: "刘文博", phone: "021-60000003", description: "覆盖风控与纪检支持条线。", status: "active" },
        ],
        members: [
          { id: "m1", name: "张晓峰", gender: "男", branchId: "b2", department: "党委办公室", position: "党委书记", phone: "13800000001", email: "zhang@example.com", politicalStatus: "中共党员", joinDate: "2008-07-01", regularDate: "2009-07-01", status: "active", remarks: "党委领导账号绑定人员。" },
          { id: "m2", name: "李海燕", gender: "女", branchId: "b2", department: "党建纪检部", position: "部门负责人", phone: "13800000002", email: "li@example.com", politicalStatus: "中共党员", joinDate: "2011-07-01", regularDate: "2012-07-01", status: "active", remarks: "全局维护角色。" },
          { id: "m3", name: "王立新", gender: "男", branchId: "b1", department: "运营管理部", position: "支部书记", phone: "13800000003", email: "wang@example.com", politicalStatus: "中共党员", joinDate: "2010-07-01", regularDate: "2011-07-01", status: "active", remarks: "第一党支部负责人。" },
          { id: "m4", name: "陈嘉宁", gender: "女", branchId: "b1", department: "客服中心", position: "客户经理", phone: "13800000004", email: "chen@example.com", politicalStatus: "中共预备党员", joinDate: "2025-07-01", regularDate: "2026-07-01", status: "probationary", remarks: "普通党员账号绑定人员。" },
          { id: "m5", name: "刘文博", gender: "男", branchId: "b3", department: "风控合规部", position: "纪检委员", phone: "13800000005", email: "liu@example.com", politicalStatus: "中共党员", joinDate: "2014-07-01", regularDate: "2015-07-01", status: "active", remarks: "机关党支部纪检联络。" },
        ],
        accounts: [
          { id: "a1", username: "leader01", password: "123456", role: "leader", memberId: "m1", status: "active" },
          { id: "a2", username: "dept01", password: "123456", role: "dept", memberId: "m2", status: "active" },
          { id: "a3", username: "branch01", password: "123456", role: "branch_admin", memberId: "m3", status: "active" },
          { id: "a4", username: "member01", password: "123456", role: "member", memberId: "m4", status: "active" },
        ],
        requests: [
          { id: "r1", memberId: "m4", actorId: "a3", actorRole: "branch_admin", stage: "leader", status: "pending_leader", changedFields: ["regularDate", "politicalStatus"], before: { regularDate: "2026-07-01", politicalStatus: "中共预备党员" }, after: { regularDate: "2026-05-01", politicalStatus: "中共党员" }, reason: "提交转正审批材料。", comment: "党建纪检部已复核，通过后直接生效。", createdAt: "2026-04-14 10:00" },
          { id: "r2", memberId: "m4", actorId: "a4", actorRole: "member", stage: "dept", status: "pending_dept", changedFields: ["phone", "email"], before: { phone: "13800000004", email: "chen@example.com" }, after: { phone: "13800009999", email: "chen_new@example.com" }, reason: "本人联系方式调整。", comment: "", createdAt: "2026-04-14 09:20" },
        ],
      };

      const state = loadData();
      const ui = { page: "dashboard", modal: null, editId: "", filters: { member: "", branch: "", request: "", account: "" } };
      let session = loadSession();

      function clone(v) { return JSON.parse(JSON.stringify(v)); }
      function uid(prefix) { return `${prefix}_${Math.random().toString(36).slice(2, 8)}`; }
      function loadData() {
        try {
          const saved = localStorage.getItem(DATA_KEY);
          return saved ? JSON.parse(saved) : clone(seed);
        } catch {
          return clone(seed);
        }
      }
      function saveData() { localStorage.setItem(DATA_KEY, JSON.stringify(state)); }
      function loadSession() {
        try { return JSON.parse(localStorage.getItem(SESSION_KEY) || "null"); } catch { return null; }
      }
      function saveSession() {
        if (session) localStorage.setItem(SESSION_KEY, JSON.stringify(session));
        else localStorage.removeItem(SESSION_KEY);
      }
      function currentAccount() { return state.accounts.find((x) => x.id === session?.accountId) || null; }
      function currentRole() { return currentAccount()?.role || null; }
      function currentMember() { return state.members.find((x) => x.id === currentAccount()?.memberId) || null; }
      function branchName(id) { return state.branches.find((x) => x.id === id)?.name || "-"; }
      function roleLabel(role) { return ROLE_LABELS[role] || role; }
      function statusTag(status) {
        const map = {
          active: ["正常", "success"], probationary: ["预备党员", "warning"], disabled: ["已停用", "danger"],
          pending_dept: ["待党建纪检部", "warning"], pending_leader: ["待党委领导", "primary"],
          approved: ["已通过", "success"], rejected: ["已退回", "danger"],
        };
        return map[status] || [status, "primary"];
      }
      function scopedMembers() {
        const role = currentRole();
        const me = currentMember();
        if (role === "leader" || role === "dept") return state.members;
        if (role === "branch_admin") return state.members.filter((x) => x.branchId === me.branchId);
        return state.members.filter((x) => x.id === me.id);
      }
      function scopedBranches() {
        const role = currentRole();
        const me = currentMember();
        if (role === "leader" || role === "dept") return state.branches;
        return state.branches.filter((x) => x.id === me.branchId);
      }
      function scopedRequests() {
        const role = currentRole();
        const account = currentAccount();
        const me = currentMember();
        if (role === "leader") return state.requests.filter((x) => x.status === "pending_leader" || x.status === "approved" || x.status === "rejected");
        if (role === "dept") return state.requests;
        if (role === "branch_admin") return state.requests.filter((x) => memberById(x.memberId)?.branchId === me.branchId || x.actorId === account.id);
        return state.requests.filter((x) => x.actorId === account.id || x.memberId === me.id);
      }
      function memberById(id) { return state.members.find((x) => x.id === id) || null; }
      function accountById(id) { return state.accounts.find((x) => x.id === id) || null; }
      function today() { return new Date().toLocaleDateString("zh-CN", { year: "numeric", month: "long", day: "numeric" }); }
      function toast(msg, type = "") {
        const el = document.getElementById("toast");
        el.className = `toast ${type}`.trim();
        el.textContent = msg;
        el.classList.remove("hidden");
        clearTimeout(toast.timer);
        toast.timer = setTimeout(() => el.classList.add("hidden"), 2500);
      }
      function exportData() {
        const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "dangjian-release-data.json";
        a.click();
        URL.revokeObjectURL(url);
      }
      function importData(file) {
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(reader.result);
            ["branches", "members", "accounts", "requests"].forEach((k) => state[k] = Array.isArray(parsed[k]) ? parsed[k] : []);
            saveData();
            render();
            toast("数据导入成功", "success");
          } catch {
            toast("导入失败，文件格式不正确", "danger");
          }
        };
        reader.readAsText(file);
      }
      function resetData() {
        Object.keys(seed).forEach((k) => state[k] = clone(seed[k]));
        saveData();
        render();
        toast("已恢复演示数据", "success");
      }
      function login(username, password) {
        const account = state.accounts.find((x) => x.username === username && x.password === password && x.status === "active");
        if (!account) return toast("账号、密码错误或账号已停用", "danger");
        session = { accountId: account.id };
        saveSession();
        ui.page = DEFAULT_PAGE[account.role];
        render();
      }
      function logout() {
        session = null;
        saveSession();
        render();
      }
      function escapeHtml(v) { return String(v ?? "").replace(/[&<>"']/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m])); }

        const data = formDataToObject(new FormData(form));
        if (type === "request_view") return closeModal();
        if (type === "password_edit") {
          if (!data.password || data.password !== data.confirmPassword) return toast("两次密码不一致", "danger");
          currentAccount().password = data.password;
          saveData();
          closeModal();
          return toast("密码修改成功", "success");
        }
        if (type === "member_create" || type === "member_edit") {
          const next = { ...(type === "member_edit" ? memberById(ui.editId) : { id: uid("m") }), ...data };
          if (!next.name || !next.department || !next.branchId) return toast("请填写党员核心信息", "danger");
          if (type === "member_edit" && currentRole() === "branch_admin") {
            const original = memberById(ui.editId);
            const parts = splitChanges(original, next);
            if (parts.safe) updateCollection("members", parts.safe);
            if (parts.sensitive) createRequest(original, parts.sensitive, "支部提交党员敏感信息变更");
            saveData(); closeModal(); render(); return toast(parts.sensitive ? "普通字段已保存，敏感字段已提交审批" : "党员信息已更新", parts.sensitive ? "warning" : "success");
          }
          updateCollection("members", next);
          saveData(); closeModal(); render(); return toast(type === "member_create" ? "党员新增成功" : "党员信息已更新", "success");
        }
        if (type === "branch_create" || type === "branch_edit") {
          const next = { ...(type === "branch_edit" ? state.branches.find((x) => x.id === ui.editId) : { id: uid("b") }), ...data };
          if (!next.name || !next.code) return toast("请填写支部名称和代码", "danger");
          updateCollection("branches", next);
          saveData(); closeModal(); render(); return toast(type === "branch_create" ? "支部创建成功" : "支部信息已更新", "success");
        }
        if (type === "account_create" || type === "account_edit") {
          const base = type === "account_edit" ? accountById(ui.editId) : { id: uid("a"), password: "123456" };
          const next = { ...base, ...data };
          if (!next.username || !next.memberId) return toast("请填写账号与绑定人员", "danger");
          const dup = state.accounts.find((x) => x.username === next.username && x.id !== next.id);
          if (dup) return toast("账号名已存在", "danger");
          if (!next.password) next.password = base.password;
          updateCollection("accounts", next);
          saveData(); closeModal(); render(); return toast(type === "account_create" ? "账号创建成功" : "账号信息已更新", "success");
        }
        if (type === "profile_edit") {
          const original = currentMember();
          const next = { ...original, ...data };
          if (currentRole() === "leader" || currentRole() === "dept") {
            updateCollection("members", next);
            saveData(); closeModal(); render(); return toast("个人资料已更新", "success");
          }
          const parts = splitChanges(original, next);
          if (parts.safe) updateCollection("members", parts.safe);
          if (parts.sensitive) createRequest(original, parts.sensitive, currentRole() === "member" ? "本人提交个人信息更正" : "支部书记提交个人信息更正");
          saveData(); closeModal(); render(); return toast(parts.sensitive ? "普通字段已保存，敏感字段已进入审批" : "个人资料已更新", parts.sensitive ? "warning" : "success");
        }
      }
      function deleteMember(id) {
        if (state.accounts.some((x) => x.memberId === id)) return toast("该党员已绑定账号，无法直接删除", "warning");
        if (!confirm("确认删除该党员吗？")) return;
        state.members = state.members.filter((x) => x.id !== id);
        saveData(); render(); toast("党员已删除", "success");
      }
      function toggleAccount(id) {
        const account = accountById(id);
        account.status = account.status === "active" ? "disabled" : "active";
        saveData(); render(); toast(account.status === "active" ? "账号已启用" : "账号已停用", "success");
      }
      function applyRequest(id, action) {
        const item = state.requests.find((x) => x.id === id);
        if (!item) return;
        if (action === "reject") {
          item.status = "rejected";
          item.comment = prompt("请输入退回原因：", "请补充资料后重新提交") || "已退回";
          saveData(); render(); return toast("申请已退回", "warning");
        }
        if (action === "forward") {
          item.status = "pending_leader";
          item.stage = "leader";
          item.comment = "党建纪检部已复核，提交党委领导审批。";
          saveData(); render(); return toast("已提交党委领导审批", "success");
        }
        const member = memberById(item.memberId);
        updateCollection("members", { ...member, ...item.after });
        item.status = "approved";
        item.comment = currentRole() === "leader" ? "党委领导审批通过。" : "党建纪检部审批通过。";
        saveData(); render(); toast("审批通过并已生效", "success");
      }
      function render() {
        document.getElementById("today").textContent = today();
        if (!session || !currentAccount()) return renderLogin();
        document.getElementById("login-screen").classList.add("hidden");
        document.getElementById("app-screen").classList.remove("hidden");
        document.getElementById("current-user").textContent = currentMember()?.name || currentAccount().username;
        document.getElementById("current-role").textContent = roleLabel(currentRole());
        renderNav();
        renderPage();
      }

      document.getElementById("login-form").addEventListener("submit", (e) => {
        e.preventDefault();
        login(document.getElementById("login-username").value.trim(), document.getElementById("login-password").value.trim());
      });
      document.addEventListener("click", (e) => {
        const t = e.target.closest("[data-fill],[data-page],[data-open],[data-delete-member],[data-toggle-account],[data-request]");
        if (!t) return;
        if (t.dataset.fill) {
          document.getElementById("login-username").value = t.dataset.fill;
          document.getElementById("login-password").value = "123456";
        }
        if (t.dataset.page) { ui.page = t.dataset.page; render(); }
        if (t.dataset.open) { openModal(t.dataset.open, t.dataset.id || ""); }
        if (t.dataset.deleteMember) deleteMember(t.dataset.deleteMember);
        if (t.dataset.toggleAccount) toggleAccount(t.dataset.toggleAccount);
        if (t.dataset.request) applyRequest(t.dataset.id, t.dataset.request);
      });
      document.addEventListener("input", (e) => {
        if (e.target.dataset.filter) { ui.filters[e.target.dataset.filter] = e.target.value; renderPage(); }
      });
      document.getElementById("logout-btn").addEventListener("click", logout);
      document.getElementById("export-btn").addEventListener("click", exportData);
      document.getElementById("reset-btn").addEventListener("click", resetData);
      document.getElementById("import-btn").addEventListener("click", () => document.getElementById("import-file").click());
      document.getElementById("import-file").addEventListener("change", (e) => {
        const file = e.target.files?.[0];
        if (file) importData(file);
        e.target.value = "";
      });
      document.getElementById("modal-close").addEventListener("click", closeModal);
      document.getElementById("modal-cancel").addEventListener("click", closeModal);
      document.getElementById("modal").addEventListener("click", (e) => { if (e.target.id === "modal") closeModal(); });
      document.getElementById("modal-form").addEventListener("submit", (e) => {
        e.preventDefault();
        saveModal(e.target);
      });

      render();
    </script>
  </body>
</html>
